<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>REALITY.EXE FAILURE</title>

<style>
html,body {
    margin:0;
    padding:0;
    overflow:hidden;
    background:#000;
}

canvas {
    position:absolute;
    inset:0;
}

#console {
    position:absolute;
    top:15px;
    left:15px;
    color:white;
    font-family:monospace;
    font-size:18px;
    z-index:10;
    text-shadow:0 0 10px cyan;
}

#title {
    font-size:30px;
    color:red;
}
</style>

</head>

<body>

<div id="console">
<div id="title">
⚠ REALITY ENGINE
</div>

<div id="status">
Loading impossible universe...
</div>

<div id="stats"></div>

</div>


<canvas id="space"></canvas>


<script>

const canvas=document.getElementById("space");
const ctx=canvas.getContext("2d");


function resize(){
    canvas.width=innerWidth;
    canvas.height=innerHeight;
}

resize();

window.onresize=resize;



let time=0;

let chaos=1;

let laws=[
"Gravity points sideways",
"Time is running backwards",
"Space is folding",
"Objects exist before creation",
"Math has crashed",
"4th dimension detected",
"Reality update installed"
];


let particles=[];



for(let i=0;i<800;i++)
{

particles.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,

z:Math.random()*1000,

angle:Math.random()*Math.PI*2,

dimension:Math.random()*8,

speed:Math.random()*5+0.2,

life:Math.random()*500

});


}



function impossibleMove(p)
{


let d=
Math.sin(
time*p.dimension
);


p.angle +=
p.speed*0.01*chaos;


p.x +=
Math.cos(p.angle+d)*p.speed*chaos;


p.y +=
Math.sin(p.angle-d)*p.speed*chaos;



// teleport through fake dimensions

if(p.x<0)
p.x=canvas.width;

if(p.x>canvas.width)
p.x=0;


if(p.y<0)
p.y=canvas.height;

if(p.y>canvas.height)
p.y=0;


}



function portal(x,y,size)
{

ctx.beginPath();


for(let i=0;i<100;i++)
{

let a=i/100*Math.PI*2;


let r=
size+
Math.sin(
time*3+i
)*20;


ctx.lineTo(
x+Math.cos(a)*r,
y+Math.sin(a)*r
);

}


ctx.strokeStyle=
`hsl(${time*100},100%,50%)`;


ctx.lineWidth=3;

ctx.stroke();


}



function draw()
{


time+=0.01;


ctx.fillStyle=
"rgba(0,0,0,0.2)";

ctx.fillRect(
0,
0,
canvas.width,
canvas.height
);



for(let p of particles)
{

impossibleMove(p);



let size=
Math.abs(
Math.sin(
time+p.dimension
)
)*8+2;



ctx.beginPath();

ctx.arc(
p.x,
p.y,
size,
0,
Math.PI*2
);



ctx.strokeStyle=
`hsl(${p.dimension*40+time*80},100%,60%)`;

ctx.stroke();



}


// random impossible portals

for(let i=0;i<5;i++)
{

portal(
canvas.width/2+
Math.sin(time+i)*300,

canvas.height/2+
Math.cos(time+i)*200,

50+i*20
);

}



requestAnimationFrame(draw);

}


draw();




// Reality console


setInterval(()=>{

document.getElementById("status").innerHTML=
laws[
Math.floor(
Math.random()*laws.length
)
];


},700);



setInterval(()=>{


chaos=
Math.random()*5+0.5;


document.getElementById("stats").innerHTML=

`
<br>
Universe Age: ${time.toFixed(3)}
<br>
Physics Stability: ${(100/chaos).toFixed(2)}%
<br>
Dimensions: ${Math.floor(Math.random()*20)+4}
<br>
Particles: ${particles.length}
`;



},500);




// random universe mutation


setInterval(()=>{


for(let p of particles)
{

p.dimension=
Math.random()*20-10;

p.speed=
Math.random()*10;

}


},3000);



</script>

</body>
</html>
