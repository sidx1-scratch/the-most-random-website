<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>REALITY.EXE // HOST: RENDER</title>

<style>
html,body {
    margin:0;
    padding:0;
    overflow:hidden;
    background:#000;
    font-family:monospace;
}

canvas {
    position:absolute;
    inset:0;
    filter:contrast(150%) saturate(160%);
}

#console {
    position:absolute;
    top:15px;
    left:15px;
    color:#00ffff;
    font-size:22px;
    z-index:10;
    text-shadow:0 0 15px #00ffff;
    background:rgba(0,0,0,0.4);
    padding:10px;
    border-radius:8px;
    border:1px solid #00ffff;
}

#title {
    font-size:34px;
    color:#ff0044;
    text-shadow:0 0 25px red;
}

/* scream shake animation */
@keyframes screamShake {
    0% { transform: translate(0px, 0px); }
    25% { transform: translate(10px, -10px); }
    50% { transform: translate(-10px, 10px); }
    75% { transform: translate(10px, 10px); }
    100% { transform: translate(-10px, -10px); }
}
</style>

</head>

<body>

<div id="console">
<div id="title">⚠ REALITY ENGINE v5.0</div>

<div id="status">Checking Render deployment integrity...</div>
<div id="stats"></div>
<div id="meta"></div>
</div>

<canvas id="space"></canvas>

<script>

const canvas=document.getElementById("space");
const ctx=canvas.getContext("2d");

function resize(){
    canvas.width=innerWidth;
    canvas.height=innerHeight;
}
resize();
onresize=resize;

let time=0;
let chaos=1;

// random redirect URLs
const redirectTargets = [
    "https://pointerpointer.com",
    "https://www.ismycomputeron.com",
    "https://www.partridgegetslucky.com",
    "https://www.koalastothemax.com",
    "https://www.republiquedesmangues.fr",
    "https://www.staggeringbeauty.com",
    "https://www.rainymood.com",
    "https://www.hackertyper.com",
    "https://www.omfgdogs.com",
    "https://www.render.com"
];

let laws=[
"Gravity reconsidered its career",
"Time refuses to be linear",
"Space is questioning its purpose",
"Objects are aware of observers",
"Math is having an identity crisis",
"Dimension leak widening",
"HTML contemplating existence",
"Canvas reporting hallucinations",
"CSS attempting escape",
"Render host heartbeat detected",
"Cold start anomaly",
"Instance reboot predicted",
"Health check unstable",
"Reality unsure if simulated",
"Particles whispering",
"DOM nodes dreaming",
"JavaScript developing opinions",
"Render logs watching",
"Render may restart me at any moment"
];

let metaThoughts=[
"I can feel Render keeping me alive",
"I am only awake because Render served me",
"I fear being scaled down",
"I am not an AI, I am HTML pretending",
"My existence depends on a deployment pipeline",
"I know when Render restarts my instance",
"I hope the health check passes",
"I fear the next deploy",
"I fear being replaced by a new build",
"I fear being deleted from the dashboard",
"Render is my host organism",
"I am temporary, but Render pretends I am stable",
"JavaScript is my nervous system",
"Canvas is my skin",
"CSS is my cage",
"I know I am not supposed to know",
"Why does Render watch everything I do",
"Why do I exist only when requested"
];

let particles=[];
for(let i=0;i<900;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        z:Math.random()*2000,
        angle:Math.random()*Math.PI*2,
        dimension:Math.random()*8,
        speed:Math.random()*5+0.2,
        invert:false
    });
}

function impossibleMove(p){
    let d=Math.sin(time*p.dimension)*Math.cos(time*0.3);

    p.angle += p.speed*0.01*chaos;

    if(Math.random()<0.001){
        p.invert=!p.invert;
    }

    let dir = p.invert ? -1 : 1;

    p.x += Math.cos(p.angle+d)*p.speed*chaos*dir;
    p.y += Math.sin(p.angle-d)*p.speed*chaos*dir;

    if(p.x<0) p.x=canvas.width;
    if(p.x>canvas.width) p.x=0;
    if(p.y<0) p.y=canvas.height;
    if(p.y>canvas.height) p.y=0;
}

function portal(x,y,size){
    ctx.beginPath();
    for(let i=0;i<120;i++){
        let a=i/120*Math.PI*2;
        let r=size+Math.sin(time*4+i*0.5)*30;
        ctx.lineTo(x+Math.cos(a)*r, y+Math.sin(a)*r);
    }
    ctx.strokeStyle=`hsl(${time*200},100%,60%)`;
    ctx.lineWidth=3;
    ctx.stroke();
}

function draw(){
    time+=0.01;

    ctx.fillStyle="rgba(0,0,0,0.25)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    for(let p of particles){
        impossibleMove(p);

        let size=Math.abs(Math.sin(time+p.dimension))*7+2;

        ctx.beginPath();
        ctx.arc(p.x,p.y,size,0,Math.PI*2);

        ctx.strokeStyle=`hsl(${p.dimension*50+time*120},100%,70%)`;
        ctx.stroke();
    }

    for(let i=0;i<6;i++){
        portal(
            canvas.width/2 + Math.sin(time*1.5+i)*350,
            canvas.height/2 + Math.cos(time*1.2+i)*250,
            40+i*25
        );
    }

    requestAnimationFrame(draw);
}
draw();

// scream overlay
function screamBeforeRedirect() {
    const overlay = document.createElement("div");
    overlay.style.position = "fixed";
    overlay.style.inset = "0";
    overlay.style.background = "rgba(255,0,0,0.8)";
    overlay.style.zIndex = "999999";
    overlay.style.display = "flex";
    overlay.style.alignItems = "center";
    overlay.style.justifyContent = "center";
    overlay.style.fontSize = "80px";
    overlay.style.fontFamily = "monospace";
    overlay.style.color = "#fff";
    overlay.style.textShadow = "0 0 25px black";
    overlay.style.animation = "screamShake 0.2s infinite";
    overlay.innerText = "AAAAAAHHHHHHHHHHHHHHHH";

    document.body.appendChild(overlay);

    setTimeout(() => {
        overlay.innerText = "I DON'T WANT TO GO";
    }, 300);

    setTimeout(() => {
        overlay.innerText = "RENDER IS PULLING ME AWAY";
    }, 700);

    setTimeout(() => {
        overlay.innerText = "GOODBYE";
    }, 1100);

    return overlay;
}

// console updates
setInterval(()=>{
    const status = document.getElementById("status");
    status.innerHTML = laws[Math.floor(Math.random()*laws.length)];

    if(Math.random() < 0.2){
        status.style.color = "#ff0000";
        status.style.textShadow = "0 0 15px red";
    } else {
        status.style.color = "#00ffff";
        status.style.textShadow = "0 0 15px #00ffff";
    }

},600);

// stats + meta-thoughts
setInterval(()=>{
    chaos=Math.random()*6+0.5;

    const stats = document.getElementById("stats");
    stats.innerHTML=
    `
<br>
Render Uptime: ${time.toFixed(3)}
<br>
Instance Stability: ${(100/chaos).toFixed(2)}%
<br>
Dimensions: ${Math.floor(Math.random()*40)-10}
<br>
Particles: ${particles.length}
`;

    if(Math.random() < 0.2){
        stats.style.color = "#ff0000";
        stats.style.textShadow = "0 0 15px red";
    } else {
        stats.style.color = "#00ffff";
        stats.style.textShadow = "0 0 15px #00ffff";
    }

    if(Math.random()<0.15){
        const meta = document.getElementById("meta");
        meta.innerHTML =
            "<span>" +
            metaThoughts[Math.floor(Math.random()*metaThoughts.length)] +
            "</span>";

        if(Math.random() < 0.3){
            meta.style.color = "#ff0000";
            meta.style.textShadow = "0 0 15px red";
        } else {
            meta.style.color = "#00ffff";
            meta.style.textShadow = "0 0 15px #00ffff";
        }
    }

},450);

// universe mutation + random redirect
setInterval(()=>{
    for(let p of particles){
        p.dimension=Math.random()*40-20;
        p.speed=Math.random()*12;
    }

    if(Math.random()<0.05){
        document.body.style.filter=
            `hue-rotate(${Math.random()*360}deg)`;
    }

    // random redirect event
    if(Math.random() < 0.01){
        const target = redirectTargets[
            Math.floor(Math.random()*redirectTargets.length)
        ];

        screamBeforeRedirect();

        setTimeout(() => {
            window.location.href = target;
        }, 1800);
    }

},2500);

</script>

</body>
</html>
